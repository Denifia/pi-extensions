<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .titletext { fill: #cdd6f4; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text { fill: #cdd6f4; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .dim { fill: #6c7086; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .green { fill: #a6e3a1; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .blue { fill: #89b4fa; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .mauve { fill: #cba6f7; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .yellow { fill: #f9e2af; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .widget-bg { fill: #313244; rx: 4; }
      .widget-border { fill: none; stroke: #585b70; stroke-width: 1; rx: 4; }
      .input-bg { fill: #181825; }
      .input-border { fill: none; stroke: #585b70; stroke-width: 1; }
      .cursor { fill: #cdd6f4; opacity: 0.8; }
      .status-bg { fill: #313244; }
      .status-text { fill: #a6adc8; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; }
      .highlight { fill: #f38ba8; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect class="bg" width="720" height="280" rx="8"/>

  <!-- Title bar -->
  <rect class="titlebar" width="720" height="28" rx="8"/>
  <rect class="titlebar" y="20" width="720" height="8"/>
  <circle cx="18" cy="14" r="5" fill="#f38ba8"/>
  <circle cx="36" cy="14" r="5" fill="#f9e2af"/>
  <circle cx="54" cy="14" r="5" fill="#a6e3a1"/>
  <text class="titletext" x="360" y="18" text-anchor="middle">pi — hashtag-snippets demo</text>

  <!-- Autocomplete widget box with multiple matches -->
  <rect class="widget-bg" x="16" y="38" width="688" height="120" rx="4"/>
  <rect class="widget-border" x="16" y="38" width="688" height="120" rx="4"/>

  <!-- Widget header -->
  <text class="yellow" x="28" y="58">#  — 6 matches, Tab to complete first:</text>

  <!-- Widget entries -->
  <text class="mauve" x="28" y="78">#brief</text>
  <text class="dim" x="100" y="78">→</text>
  <text class="text" x="118" y="78">at the conclusion of your changes make me a brief…</text>

  <text class="mauve" x="28" y="96">#plan</text>
  <text class="dim" x="92" y="96">→</text>
  <text class="text" x="110" y="96">before starting any changes, lay out a detailed step…</text>

  <text class="mauve" x="28" y="114">#review</text>
  <text class="dim" x="108" y="114">→</text>
  <text class="text" x="126" y="114">At the end, do a self-review pass: check for logic…</text>

  <text class="mauve" x="28" y="132">#safe</text>
  <text class="dim" x="88" y="132">→</text>
  <text class="text" x="106" y="132">before executing any destructive commands confirm…</text>

  <text class="dim" x="28" y="150">… and 2 more (type more chars to narrow down)</text>

  <!-- Input area -->
  <rect class="input-bg" x="16" y="172" width="688" height="36" rx="4"/>
  <rect class="input-border" x="16" y="172" width="688" height="36" rx="4"/>

  <!-- Prompt text -->
  <text class="green" x="28" y="195">❯</text>
  <text class="text" x="46" y="195">Refactor the auth module </text>
  <text class="highlight" x="248" y="195">#</text>
  <rect class="cursor" x="256" y="182" width="8" height="18"/>

  <!-- Status bar -->
  <rect class="status-bg" x="0" y="252" width="720" height="28"/>
  <text class="status-text" x="16" y="270">claude-sonnet</text>
  <text class="status-text" x="350" y="270" text-anchor="middle">my-project</text>
  <text class="green" style="font-family: 'Cascadia Code', monospace; font-size: 11px;" x="670" y="270">#6</text>

  <!-- Label -->
  <text class="dim" x="16" y="225" style="font-size: 11px;">↑ Type just # to see all available snippets</text>
  <text class="dim" x="16" y="241" style="font-size: 11px;">  The #6 indicator in the status bar shows how many snippets are loaded</text>
</svg>