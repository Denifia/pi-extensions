<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .titletext { fill: #cdd6f4; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text { fill: #cdd6f4; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .dim { fill: #6c7086; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .green { fill: #a6e3a1; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .blue { fill: #89b4fa; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .mauve { fill: #cba6f7; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .yellow { fill: #f9e2af; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .input-bg { fill: #181825; }
      .input-border { fill: none; stroke: #585b70; stroke-width: 1; }
      .cursor { fill: #cdd6f4; opacity: 0.8; }
      .status-bg { fill: #313244; }
      .status-text { fill: #a6adc8; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 11px; }
      .highlight { fill: #f38ba8; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
      .arrow { fill: #a6e3a1; font-family: 'Cascadia Code', monospace; font-size: 15px; }
    </style>
  </defs>

  <!-- Terminal background -->
  <rect class="bg" width="720" height="280" rx="8"/>

  <!-- Title bar -->
  <rect class="titlebar" width="720" height="28" rx="8"/>
  <rect class="titlebar" y="20" width="720" height="8"/>
  <circle cx="18" cy="14" r="5" fill="#f38ba8"/>
  <circle cx="36" cy="14" r="5" fill="#f9e2af"/>
  <circle cx="54" cy="14" r="5" fill="#a6e3a1"/>
  <text class="titletext" x="360" y="18" text-anchor="middle">pi — what you type vs. what the model receives</text>

  <!-- BEFORE section -->
  <text class="dim" x="28" y="54">WHAT YOU TYPE:</text>
  <rect class="input-bg" x="16" y="62" width="688" height="32" rx="4"/>
  <rect class="input-border" x="16" y="62" width="688" height="32" rx="4"/>
  <text class="text" x="28" y="83">Fix the login bug </text>
  <text class="highlight" x="176" y="83">#brief</text>
  <text class="text" x="228" y="83"> </text>
  <text class="highlight" x="236" y="83">#test</text>

  <!-- Arrow -->
  <text class="arrow" x="340" y="118" text-anchor="middle">▼  expanded at submit time  ▼</text>

  <!-- AFTER section -->
  <text class="dim" x="28" y="142">WHAT THE MODEL RECEIVES:</text>
  <rect class="input-bg" x="16" y="150" width="688" height="70" rx="4"/>
  <rect class="input-border" x="16" y="150" width="688" height="70" rx="4"/>
  <text class="text" x="28" y="170">Fix the login bug </text>
  <text class="green" x="176" y="170">at the conclusion of your changes make me a</text>
  <text class="green" x="28" y="188">brief with the write_debrief tool</text>
  <text class="text" x="300" y="188"> </text>
  <text class="green" x="308" y="188">after making changes, write</text>
  <text class="green" x="28" y="206">comprehensive tests covering normal cases, edge cases, and error paths</text>

  <!-- Status bar -->
  <rect class="status-bg" x="0" y="252" width="720" height="28"/>
  <text class="status-text" x="360" y="270" text-anchor="middle">Tags are expanded inline — the model never sees the #tag syntax</text>
</svg>